name: CI

on:
  push:
    paths:
      - "speech-coach/**"
  pull_request:
    paths:
      - "speech-coach/**"

defaults:
  run:
    working-directory: speech-coach

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]" || pip install -e .
      - name: Pytest
        run: pytest tests/ -q
